services:
  # Solo levanta PostgreSQL - la API se corre con npm run start:dev
  db:
    image: postgres:16
    container_name: automotores_db
    environment:
      POSTGRES_DB: automotores_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/postgres-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d automotores_db']
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:
